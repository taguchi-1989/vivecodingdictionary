# エントリ定義スキーマ v2（iter 22 / 2026-04-25）
#
# docs/v2_rules_summary.md §2 の「決定版ルール」を機械可読 YAML に落としたもの。
# 下記 3 コンポーネントが共通入力として参照する:
#   - 静的サイト生成器（B 方針で実装予定）
#   - scripts/validate_entry.py（strict validator）
#   - drafts/prototypes/mockups/design_philosophy_v2/check_entry.py（v2 validator）
#
# 数値を変えるときは: (1) 本ファイル → (2) v2_rules_summary §2 本文 → (3) 各 validator
# の順で更新し、双方向で整合を取る。本ファイルと v2_rules_summary に差があれば、
# **本ファイル（schema）を正**とする。

schema_version: "v2.30.0"
updated_at: "2026-05-13"
canonical_doc: "docs/v2_rules_summary.md"

# 変更履歴
# - v2.30.0 (2026-05-13): 前付け（A 章）用に `page_layout` enum を 7 値拡張し、
#   front_* レイアウト群を新設。詳細は docs/front_section_layout.md（前付け仕様）。
#   spread_v1 の本編ルールは無変更。`page_layout` が front_* のときは
#   figure_type / related_terms / 必須節・字数合計の判定を layout 別に切り替える。
#   id は letter ID に加えて `^front_[a-z_]+$` を許容（扉エントリ用）。
# - v2.29.0 (2026-04-30): 任意フィールド `importance` (A〜E) を追加。
#   読み始める優先度（reader_level=前提知識レベル とは独立した軸）。
#   A=必須（AI ニュースを目にする全員 / ChatGPT, Claude, LLM, Hallucination 等）
#   B=一般（仕事で AI を使う非エンジニア / Token, MCP, Cursor, Deep Research 等）
#   C=中級（業務で本格活用する人 / Tool Use, Hook, Subagent 等）
#   D=上級（エンジニア・実装者 / 量子化, LoRA, Tauri, Whisper 等）
#   E=開発者向け（研究者・歴史・コア実装 / gpt-oss, ノイマン型, Anthropic 創業 等）
#   誌面では右上ナビ・フッターのバッジで示す予定（実装は別担当）。
#   validator は enum 外れを ⚠️ 警告、未指定は許容。
# - v2.28.0 (2026-04-28): タイトル末尾の括弧書き読み（例: `Context（コンテキスト）`）を
#   廃止し、新スロット `title_reading`（任意）を追加。タイトルは純粋名のみ、読み・
#   日本語展開はタイトル直下の独立スロットに表示する。誌面では 14px グレー。
# - v2.27.0 (2026-04-28): status enum に `skeleton` を追加。validator は archived/sample と
#   同様にスキップ。スケルトン先行運用（templates/skeleton_template.md と
#   scripts/generate_skeleton.py）の根拠。
# - v2.26.0 (2026-04-26): 「会話での使い方例」セクションを左ページ末尾に追加。
#   下チロム右側「（会話での使い方例）」スロットに印字。25-50 字（推奨 30-40）、1 文。
# - v2.22.1 (2026-04-25): iter 22 で関連用語を右ページ下段へ移動、右ページ冒頭タイトル削除。

# ────────────────────────────────────────
# YAML フロントマター（md の --- --- 部）
# ────────────────────────────────────────
frontmatter:
  required:
    - key: id
      format: regex
      pattern: "^([A-J]-\\d{1,2}|front_[a-z_]+)$"   # 例: A-1, B-3, D-12 / front_concept（扉）
      description: letter-数字 ID または `front_` 接頭辞 ID（前付け）
      severity: error
    - key: title
      min_chars: 1
      max_chars: 20
      recommended_max_chars: 12
      severity: error
      # 純粋な見出し名のみ。括弧書きの読み・日本語訳・展開は title_reading へ
      # （2026-04-28 ルール変更）
    - key: category
      enum: [service, model, term, tool, workflow, history, person, person_org, benchmark, common, mcp, term_general]
      severity: error
    - key: figure_type
      enum: [before_after, structure, comparison, workflow, timeline]
      severity: error
      # iter 22 で 5 primitive すべてに CSS class を割当。component_spec_v2.md §2-6 参照
      css_class_map:
        before_after: ".figure-ba"
        structure: ".figure-structure"
        comparison: ".figure-comparison"
        workflow: ".figure-workflow"
        timeline: ".figure-timeline"
    - key: page_layout
      enum:
        - spread_v1                 # 本編（B〜J 章）。既存仕様（§1〜2）
        - front_concept_spread      # 扉（前付け）
        - front_essay               # A-1 まえがき
        - front_anatomy             # A-2 見開きの読み方
        - front_map_index           # A-3 + A-9
        - front_legend_marks        # A-4 + A-5 + A-6
        - front_swatch              # A-7 + A-8
        - front_log_glossary        # A-10 + A-11
      severity: error
      # 2026-05-13: 前付け 7 値を追加。front_* レイアウトのルールは
      # docs/front_section_layout.md §4 を参照。本ファイル末尾の
      # `front_layouts:` 節で layout 別の必須/任意・字数目安を機械可読に持つ。
    - key: evaluation_date
      format: regex
      pattern: "^\\d{4}-\\d{2}-\\d{2}$"
      severity: error
    - key: status
      enum: [skeleton, drafting, sample, needs_source, needs_review, ready, archived, candidate]
      severity: error
      # skeleton: 構造だけ置いた本文未着手の状態（2026-04-28 追加）。
      # validator はスキップする。skeleton → drafting → needs_review → ready で昇格させる。
    - key: related_terms
      type: list
      min_items: 3
      max_items: 5
      severity: error

  recommended:
    - key: title_reading
      description: |
        タイトルの読み（読み専用スロット）。誌面ではタイトル直下に 14px グレーで表示。
        英字略称・英字タイトルは「英単語をカタカナで並べた読み」を入れる。
        例: `ギット` (Git) / `コンテキスト` (Context) / `モデルコンテキストプロトコル` (MCP) /
            `ラージランゲージモデル` (LLM) / `アクセシビリティ` (a11y)。
        略称音読み（`えむしーぴー` 等）や日本語訳（`大規模言語モデル` 等）は入れない。
        正式名称は tagline 冒頭へ回す（`Model Context Protocol の略。…`）。
        既に title 自体が日本語で読み補足が不要なら省略する。
      min_chars: 2
      max_chars: 30
      recommended_max_chars: 15
      severity: warn
      # 2026-04-28 追加・改訂。schema_version v2.28.1（title_reading は読み専用、略称展開は tagline へ）
    - key: subtype
      description: language / framework / ai_assistant / anthropic などの下位分類
      severity: info
    - key: experience_level
      enum: [hands_on, partial, research_only]
      severity: warn
    - key: reader_level
      format: regex
      pattern: "^(\\d|\\d-\\d)$"   # "1" または "2-3"
      severity: warn

    - key: importance
      description: |
        読み始める優先度（誰がまず読むべきか）。reader_level（前提知識レベル）とは
        独立した軸として、本書全体での重要度を A〜E の 5 段階で示す。
        A: 必須（AI ニュースを目にする全員。例: ChatGPT, Claude, Gemini, LLM, Hallucination）
        B: 一般（仕事で AI を使う非エンジニア。例: Token, Context, MCP, Cursor, Deep Research）
        C: 中級（業務で本格活用する人。例: Tool Use, Hook, Slash Command, Subagent）
        D: 上級（エンジニア・実装者。例: 量子化, LoRA, Tensor コア, Tauri, Whisper）
        E: 開発者向け（研究者・歴史・コア実装。例: gpt-oss, ノイマン型, Anthropic 創業）
        誌面では右上ハンバーガーナビ・左ページフッターのバッジで示す（実装は別担当）。
      enum: [A, B, C, D, E]
      severity: warn
      since: "2026-04-30"

  time_varying_required:  # version_status または pricing_note がある場合、出典メモに checked 日付必須
    - key: version_status
      enum: [active, preview, deprecated]
      severity: warn
    - key: pricing_note
      enum: [none, paid, freemium]
      severity: warn

# ────────────────────────────────────────
# 左ページの節（markdown 節 → 誌面配置）
# ────────────────────────────────────────
left_page:
  - slot: title
    source: yaml.title
    min_chars: 1
    max_chars: 20
    recommended_max_chars: 12
    severity: warn

  - slot: title_reading
    # タイトル直下に 14px グレーで表示。任意（YAML title_reading が無ければ非表示）。
    # 2026-04-28 追加（schema_version v2.28.0）
    source: yaml.title_reading
    optional: true
    min_chars: 2
    max_chars: 30
    recommended_max_chars: 15
    severity: warn
    css_component: ".title-reading"

  - slot: tagline
    heading: "## tagline"
    min_chars: 25
    max_chars: 45
    recommended_min_chars: 30
    recommended_max_chars: 38
    sentences: [1, 2]
    forbid_title_echo: true   # title と同じ単語始まりを禁止
    severity: error

  - slot: experience_level_tag
    source: yaml.experience_level
    severity: info

  - slot: reader_level_tag
    source: yaml.reader_level
    severity: info

  - slot: nanishiteku
    heading: "## 何をしてくれるか"
    min_chars: 60
    max_chars: 200
    recommended_min_chars: 80
    recommended_max_chars: 150
    sentences: [2, 4]
    desumasu_required: true
    severity: error

  - slot: dokode_deau
    heading: "## どこで出会うか"
    min_chars: 60
    max_chars: 200
    recommended_min_chars: 80
    recommended_max_chars: 150
    sentences: [2, 4]
    desumasu_required: true
    severity: error

  - slot: main_figure
    heading: "## メイン図"
    figure_type_dependent: true
    caption_min_chars: 10
    caption_max_chars: 25
    severity: warn

  - slot: ponchi_slot
    # 誌面では Before/After の直下、左ページ最下段。iter 22 でメインビジュアル化
    # markdown 上は「誌面ポンチ絵メモ」節に caption と登場人物メモを書く運用
    source: heading_subsection
    caption_min_chars: 30
    caption_max_chars: 80
    css_component: ".ponchi-slot"
    design_tokens:
      min_height_px: 340
      icon_diameter_px: 200
      icon_svg_px: 104
      padding: "28px 24px"
    severity: warn

# ────────────────────────────────────────
# 右ページの節（iter 22 順）
# ────────────────────────────────────────
right_page:
  - slot: mihidokoro
    heading: "## この用語の見どころ"
    # iter 22 検証で、許容（15-40）だと右ページが詰まり過ぎる傾向がわかった。
    # TypeScript 見本の実測（19-26 字）を踏まえ、**推奨 15-30 字**を目安にする。
    # 許容上限は維持するが、30 字超は validator の ⚠️ 警告対象。
    subsections:
      - id: 1
        heading: "### 1. 役割"
        min_chars: 15
        max_chars: 40
        recommended_max_chars: 30
        severity: error
      - id: 2
        heading: "### 2. うれしさ"
        min_chars: 15
        max_chars: 40
        recommended_max_chars: 30
        severity: error
      - id: 3
        heading: "### 3. 注意点"
        min_chars: 15
        max_chars: 40
        recommended_max_chars: 30
        severity: error
      - id: 4
        heading: "### 4. どこで役立つか"
        min_chars: 15
        max_chars: 40
        recommended_max_chars: 30
        severity: error
      - id: 5
        heading: "### 5. はじめに"
        min_chars: 15
        max_chars: 40
        recommended_max_chars: 30
        severity: error
      - id: 6
        heading: "### 6. 深掘り先"
        min_chars: 15
        max_chars: 50
        recommended_max_chars: 35
        severity: error
    total_min_chars: 120
    total_max_chars: 240
    total_recommended_max_chars: 180

  - slot: tsumazuki
    heading: "## 非エンジニアのつまずき"
    items_fixed: 3           # iter 22 で 3 固定
    item_min_chars: 15
    item_max_chars: 60       # 2026-05-02 改: 実態に合わせて上限を 60 に拡張、超過は ⚠️
    item_recommended_max_chars: 50
    authored_by: user_only   # AI は触らない、空スケルトンのみ残す
    severity: warn           # 項目数 ＋ item_max_chars 超で警告

  - slot: watashino_comment
    heading: "## 私のコメント"
    items_fixed: 4           # first / good / bad / who 固定
    item_min_chars: 10
    item_max_chars: 45       # 2026-05-02 改: 上限 45 字、超過は ⚠️
    item_recommended_max_chars: 40
    labels: [第一印象, 良い点, ダメな点, 誰向けか]
    badges: ["★", "✓", "!", "☺"]
    authored_by: user_only
    severity: warn

  - slot: kaihatsu_flow
    heading: "## 開発フローでの位置（必須）"
    steps_recommended: 4    # 誌面が最も美しく収まる（iter 22 で確定）
    steps_min: 4
    steps_max: 5            # 許容上限。5 ステップはラベル 13px に自動縮小
    steps_forbidden_over: 5 # 6 以上は横幅破綻。縦並びや図分割を検討
    step_label_min_chars: 3
    step_label_max_chars: 15
    step_note_max_chars: 20
    total_min_chars: 80
    total_max_chars: 180
    severity: error

  - slot: related_terms
    # iter 22 で左ページから右ページ下段（開発フロー直下）へ移動
    heading: "## 関連用語"
    items_min: 3
    items_max: 5
    item_name_min_chars: 1
    item_name_max_chars: 10
    visible_total_min_chars: 20
    visible_total_max_chars: 50
    # "用語A — 隣接メモ" の隣接メモ部分は誌面非表示、validator は前 " — " まで
    yaml_sync: related_terms   # YAML の related_terms と一致
    severity: error

  - slot: references_url
    # 出典メモ末尾から代表 URL 1 本を抽出する想定
    source: heading_subsection
    format: "URL checked YYYY-MM-DD"
    required_if: time_varying
    severity: error

# ────────────────────────────────────────
# 左右ページ合計（☆ 違反判定）
# ────────────────────────────────────────
page_totals:
  left:
    min_chars: 155
    max_chars: 250
    stars_threshold_over: 100   # 合計が max + 100 字超で ☆ 違反
    includes: [tagline, nanishiteku, dokode_deau]
  right:
    min_chars: 220
    max_chars: 430
    stars_threshold_over: 100
    includes: [mihidokoro, kaihatsu_flow, related_terms]

# ────────────────────────────────────────
# 裏台帳メモ（誌面に出ない）
# ────────────────────────────────────────
back_ledger:
  - slot: ponchi_memo
    heading: "## 誌面ポンチ絵メモ"
    severity: info
    description: デザイン担当向け指示書（メイン図／6 視点アイコン／開発フロー図の描く内容）
  - slot: community_memo
    heading: "## コミュニティ補完メモ"
    severity: info
  - slot: sources_memo
    heading: "## 出典メモ"
    format: "URL または誌名 — checked YYYY-MM-DD"
    required_if: time_varying
    severity: error
  - slot: remarks
    heading: "## 備考"
    severity: info

# ────────────────────────────────────────
# トーン・文体ルール（機械判定可能なもの）
# ────────────────────────────────────────
tone:
  desumasu_required_sections: [nanishiteku, dokode_deau]
  tagline_title_echo_forbidden: true
  strong_assertion_words: [最新, 最強, 完全に, 絶対に, 必ず]
  allowed_emojis: ["★", "✓", "!", "☺", "🙂", "👍", "👎", "👥"]

# ────────────────────────────────────────
# 必須節（markdown に存在すべき H2/H3）
# ────────────────────────────────────────
required_sections:
  - "## tagline"
  - "## 何をしてくれるか"
  - "## どこで出会うか"
  - "## メイン図"
  - "## この用語の見どころ"
  - "## 開発フローでの位置（必須）"
  - "## 関連用語"
  - "## 非エンジニアのつまずき"
  - "## 私のコメント"

required_subsections:
  - "### 1. 役割"
  - "### 2. うれしさ"
  - "### 3. 注意点"
  - "### 4. どこで役立つか"
  - "### 5. はじめに"
  - "### 6. 深掘り先"

# ────────────────────────────────────────
# リネーム履歴（旧見出しの互換警告用）
# ────────────────────────────────────────
legacy_heading_map:
  - old: "## ひとことで"
    new: null                        # v2 で削除（tagline に統合）
    since: iter7
  - old: "## バイブコーディングでの位置づけ"
    new: "## どこで出会うか"
    since: iter5
  - old: "### 4. どこで効くか"
    new: "### 4. どこで役立つか"
    since: iter10
  - old: "### 5. 最初に理解する範囲"
    new: "### 5. はじめに"
    since: iter6
  - old: "## 非エンジニア視点のつまずき"
    new: "## 非エンジニアのつまずき"
    since: "2026-04-25"
  - old: "誰に向くか"
    new: "誰向けか"
    since: "2026-04-25"
  - old: "右ページ冒頭タイトル"
    new: null                        # iter 22 で削除
    since: iter22
  - old: "タイトル末尾の括弧書き読み（例: `Context（コンテキスト）`）"
    new: "title_reading スロット（独立）"
    since: "2026-04-28"

# ────────────────────────────────────────
# 前付け（A 章）の例外レイアウト群
# 詳細は docs/front_section_layout.md。spread_v1 とは別系のルールを layout 別に持つ
# ────────────────────────────────────────
front_layouts:
  # 共通方針
  policy:
    id_pattern: "^([A-J]-\\d{1,2}|front_[a-z_]+)$"  # letter ID または front_ 接頭辞
    auto_promote: false                              # drafting → needs_review の自動昇格を停止
    required_sections_check: false                   # spread_v1 用の必須節検査をスキップ
    char_totals_check: false                         # 左右ページ合計 ☆ 判定をスキップ
    figure_type: optional                            # 全 layout で任意
    spread_position_enum: [left, right, full]        # 複数 ID 同居時のページ担当

  # 各 layout の固有ルール（related_terms 必須個数、字数目安、構成 ID）
  layouts:
    - name: front_concept_spread
      assigned_ids: ["front_concept"]               # 扉。letter ID 体系外、ledger 外
      related_terms: optional
      char_hint_left:  "80-120"
      char_hint_right: "80-120"
      note: "扉。タイトル無し・ページ番号無し・章ラベル無し"

    - name: front_essay
      assigned_ids: ["A-1"]
      related_terms: optional
      char_hint_left:  "30-50（リード）"
      char_hint_right: "350-500（本文）"
      note: "まえがき。著者ボイスで書く巻頭言。tagline 帯・6 視点・著者欄は置かない"

    - name: front_anatomy
      assigned_ids: ["A-2"]
      related_terms: optional
      char_hint_left:  "—（コールアウトのみ）"
      char_hint_right: "—（コールアウトのみ）"
      char_hint_total: "200-300（左右合計）"
      note: "本編 1 エントリの実物見開きを敷いてコールアウトで指す注釈図"

    - name: front_map_index
      assigned_ids: ["A-3", "A-9"]
      related_terms: required_3_5                    # A-3 / A-9 それぞれに 3〜5 個
      char_hint_left:  "150-250"
      char_hint_right: "150-250"
      note: "A-3 は左（A〜J 地図）、A-9 は右（ミニ索引）。spread_position で left/right 明示"

    - name: front_legend_marks
      assigned_ids: ["A-4", "A-5", "A-6"]
      related_terms: required_3_5                    # A-4 / A-5 / A-6 それぞれ
      char_hint_left:  "200-300（タグ／レベル凡例）"
      char_hint_right: "100-180（評価日凡例）"
      note: "A-4 / A-5 は左、A-6 は右。3 エントリ同居"

    - name: front_swatch
      assigned_ids: ["A-7", "A-8"]
      related_terms: optional
      char_hint_left:  "100-180（図カタログ）"
      char_hint_right: "100-180（色・記号スウォッチ）"
      note: "実物見本帳。文字より物理サンプルが主役"

    - name: front_log_glossary
      assigned_ids: ["A-10", "A-11"]
      related_terms: optional
      char_hint_left:  "履歴 1 ブロック + タイムライン"
      char_hint_right: "略称 4 列表"
      note: "更新履歴とリファレンス表。表とタイムラインのレイアウトが主役"
