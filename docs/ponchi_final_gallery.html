<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ポンチ画像一覧</title>
<style>
:root {
  color-scheme: light;
  --bg: #f6f7f4;
  --panel: #ffffff;
  --ink: #20252b;
  --muted: #64707d;
  --line: #d9dfd2;
  --accent: #2f6f63;
  --accent-2: #a64f22;
  --trial: #355ca8;
  --soft: #edf3ef;
  --candidate-bg: #fff2e8;
  --trial-bg: #edf2ff;
  --shadow: 0 8px 24px rgba(32, 37, 43, .08);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { margin: 0; background: var(--bg); color: var(--ink); font-family: "Yu Gothic UI", "Meiryo", system-ui, sans-serif; }
header { position: sticky; top: 0; z-index: 10; background: rgba(246, 247, 244, .94); border-bottom: 1px solid var(--line); backdrop-filter: blur(10px); }
.header-inner { max-width: 1440px; margin: 0 auto; padding: 18px 20px 14px; }
.topline { display: flex; align-items: end; justify-content: space-between; gap: 18px; margin-bottom: 14px; }
h1 { margin: 0; font-size: 28px; line-height: 1.1; font-weight: 800; letter-spacing: 0; }
.stats { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; color: var(--muted); font-size: 13px; }
.stat { border: 1px solid var(--line); background: var(--panel); border-radius: 8px; padding: 6px 9px; }
.controls { display: grid; grid-template-columns: minmax(220px, 360px) 1fr; gap: 12px; align-items: start; }
.search { width: 100%; min-height: 38px; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; background: var(--panel); color: var(--ink); font-size: 14px; }
.filter-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { min-width: 42px; height: 38px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); color: var(--ink); font-weight: 700; cursor: pointer; padding: 0 11px; }
.chip.active { border-color: var(--accent); background: var(--soft); color: var(--accent); }
.source-chip.active[data-source="candidate"] { border-color: var(--accent-2); background: var(--candidate-bg); color: var(--accent-2); }
.source-chip.active[data-source="trial"] { border-color: var(--trial); background: var(--trial-bg); color: var(--trial); }
main { max-width: 1440px; margin: 0 auto; padding: 22px 20px 56px; }
.notice { margin: 0 0 16px; border: 1px solid #edc2a5; background: var(--candidate-bg); border-radius: 8px; padding: 12px 14px; color: #63351f; font-size: 14px; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
.card { overflow: hidden; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); box-shadow: var(--shadow); }
.card.candidate { border-color: #edc2a5; }
.card.trial { border-color: #b8c8ee; }
.thumb-button { display: block; width: 100%; padding: 0; border: 0; background: #e8ece4; cursor: zoom-in; }
.thumb { display: block; width: 100%; aspect-ratio: 2 / 1; object-fit: cover; }
.meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 9px 10px 7px; border-top: 1px solid var(--line); }
.id { font-family: Consolas, "SFMono-Regular", monospace; font-size: 13px; font-weight: 800; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.size { color: var(--muted); font-size: 12px; white-space: nowrap; }
.badge-row { display: flex; gap: 7px; align-items: center; padding: 0 10px 8px; flex-wrap: wrap; }
.badge { display: inline-flex; align-items: center; min-height: 22px; border: 1px solid var(--line); border-radius: 8px; padding: 2px 7px; color: var(--muted); font-size: 11px; font-weight: 800; }
.badge.candidate { border-color: #edc2a5; background: var(--candidate-bg); color: var(--accent-2); }
.badge.trial { border-color: #b8c8ee; background: var(--trial-bg); color: var(--trial); }
.links { display: flex; gap: 8px; padding: 0 10px 10px; }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }
.links a { font-size: 12px; }
.empty { display: none; border: 1px dashed var(--line); border-radius: 8px; padding: 28px; text-align: center; color: var(--muted); background: rgba(255, 255, 255, .6); }
dialog { width: min(96vw, 1280px); border: 0; border-radius: 8px; padding: 0; background: var(--panel); box-shadow: 0 16px 48px rgba(32, 37, 43, .22); }
dialog::backdrop { background: rgba(25, 30, 34, .62); }
.dialog-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--line); }
.dialog-title { font-family: Consolas, "SFMono-Regular", monospace; font-weight: 800; }
.close { width: 36px; height: 36px; border: 1px solid var(--line); border-radius: 8px; background: var(--panel); color: var(--ink); font-size: 22px; line-height: 1; cursor: pointer; }
.dialog-img { display: block; width: 100%; height: auto; background: #e8ece4; }
@media (max-width: 760px) {
  .topline { align-items: start; flex-direction: column; }
  .stats { justify-content: flex-start; }
  .controls { grid-template-columns: 1fr; }
  h1 { font-size: 23px; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
}
</style>
</head>

const grid = document.getElementById('grid');
const search = document.getElementById('search');
const visibleCount = document.getElementById('visibleCount');
const empty = document.getElementById('empty');
const viewer = document.getElementById('viewer');
const viewerTitle = document.getElementById('viewerTitle');
const viewerImage = document.getElementById('viewerImage');
let chapter = 'all';
let source = 'final';

function render() {
  const query = search.value.trim().toLowerCase();
  const visible = items.filter(item => {
    const chapterMatch = chapter === 'all' || item.chapter === chapter;
    const sourceMatch = source === 'all' || item.source === source;
    const queryMatch = !query || [item.id, item.display, item.alt, item.batch].some(value => value.toLowerCase().includes(query));
    return chapterMatch && sourceMatch && queryMatch;
  });
  visibleCount.textContent = visible.length;
  empty.style.display = visible.length ? 'none' : 'block';
  grid.innerHTML = visible.map(item => `
    <article class="card ${item.source}">
      <button class="thumb-button" type="button" data-key="${item.source}:${item.alt}:${item.batch}">
        <img class="thumb" src="${item.src}" width="${item.width}" height="${item.height}" loading="lazy" alt="${item.alt}">
      </button>
      <div class="meta">
        <span class="id" title="${item.display}">${item.display}</span>
        <span class="size">${item.width}x${item.height}</span>
      </div>
      <div class="badge-row">
        <span class="badge ${item.source}">${item.sourceLabel}</span>
        ${item.batch ? `<span class="badge">${item.batch}</span>` : ''}
      </div>
      <div class="links">
        <a href="${item.primaryLink}" target="_blank" rel="noopener">open</a>
        ${item.secondaryLink ? `<a href="${item.secondaryLink}" target="_blank" rel="noopener">${item.secondaryLabel}</a>` : ''}
      </div>
    </article>
  `).join('');
}

document.querySelectorAll('.source-chip').forEach(button => {
  button.addEventListener('click', () => {
    document.querySelectorAll('.source-chip').forEach(el => el.classList.remove('active'));
    button.classList.add('active');
    source = button.dataset.source;
    render();
  });
});

document.querySelectorAll('.chapter-chip').forEach(button => {
  button.addEventListener('click', () => {
    document.querySelectorAll('.chapter-chip').forEach(el => el.classList.remove('active'));
    button.classList.add('active');
    chapter = button.dataset.chapter;
    render();
  });
});

search.addEventListener('input', render);

grid.addEventListener('click', event => {
  const button = event.target.closest('.thumb-button');
  if (!button) return;
  const item = items.find(entry => `${entry.source}:${entry.alt}:${entry.batch}` === button.dataset.key);
  if (!item) return;
  viewerTitle.textContent = `${item.display}  ${item.width}x${item.height}  ${item.sourceLabel} ${item.batch}`;
  viewerImage.src = item.src;
  viewerImage.alt = item.alt;
  viewer.showModal();
});

document.getElementById('closeViewer').addEventListener('click', () => viewer.close());
viewer.addEventListener('click', event => { if (event.target === viewer) viewer.close(); });

render();
</script>
