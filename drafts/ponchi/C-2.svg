<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="1.9"/>
    </filter>
  </defs>
  <rect width="192" height="192" fill="#F3F6FB"/>
  <g filter="url(#sketch)" stroke="#1A1A1A" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- 上部：「三大 AI 企業の一角」帯（吹き出し風） -->
    <g stroke-width="1.6">
      <path d="M 18 8 Q 14 4 22 4 L 168 5 Q 178 5 176 14 L 174 22 Q 172 28 162 26 L 110 26 L 104 32 L 106 26 L 28 26 Q 18 24 18 16 Z"/>
      <text x="96" y="19" font-size="10" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">三大 AI 企業の一角</text>
    </g>

    <!-- 中央：研究所／本社ビル（屋根は完璧な三角を避けて少し歪ませる） -->
    <g stroke-width="2.2">
      <!-- 屋根 -->
      <path d="M 60 76 L 96 56 L 134 75 L 132 78 L 96 60 L 62 78 Z"/>
      <!-- 本体（柱と壁の長方形） -->
      <path d="M 64 78 L 62 134 L 132 132 L 134 76"/>
      <!-- 柱 4 本（直線を避けて軽く揺らす） -->
      <path d="M 74 80 Q 73 104 75 130"/>
      <path d="M 88 80 Q 87 104 89 130"/>
      <path d="M 104 80 Q 105 104 103 130"/>
      <path d="M 118 80 Q 119 104 117 130"/>
      <!-- 入口ドア -->
      <path d="M 90 132 L 90 116 Q 96 112 102 116 L 102 132"/>
      <!-- 階段 -->
      <path d="M 78 134 L 118 134"/>
      <path d="M 74 138 L 122 138"/>
      <!-- 玄関上の銘板（"2021" と読める短線、ロゴは描かない） -->
      <path d="M 84 88 L 108 88 L 108 96 L 84 96 Z"/>
      <text x="96" y="94" font-size="6" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">est. 2021</text>
    </g>

    <!-- 左側：研究員の人々の集まり（後ろ姿シルエット 2 人、議論中） -->
    <g stroke-width="1.8">
      <!-- 人物 A -->
      <path d="M 20 96 C 26 94 30 102 28 110 C 26 116 20 116 18 112 C 14 108 14 98 20 96 Z"/>
      <path d="M 14 116 L 12 138 L 32 138 L 30 116"/>
      <path d="M 14 122 Q 8 130 10 138"/>
      <!-- 人物 B（少し後ろ） -->
      <path d="M 38 100 C 44 98 48 106 46 114 C 44 120 38 120 36 116 C 32 112 32 102 38 100 Z"/>
      <path d="M 32 120 L 30 140 L 50 140 L 48 120"/>
      <path d="M 48 126 Q 54 134 52 140"/>
      <!-- 議論アイデアの吹き出し（小さい雲） -->
      <path d="M 8 84 Q 4 80 10 78 Q 14 72 22 76 Q 28 74 28 82 Q 30 88 22 88 Q 16 92 10 88 Q 4 88 8 84 Z"/>
    </g>

    <!-- 右側：Claude 系プロダクトの列（チャット吹き出し / ターミナル / API） -->
    <g stroke-width="1.6">
      <!-- チャット吹き出し（Claude.ai を示唆） -->
      <path d="M 154 86 Q 152 78 162 78 L 184 79 Q 190 80 188 88 L 186 96 Q 184 100 178 100 L 168 100 L 162 106 L 164 100 L 162 100 Q 154 98 154 92 Z"/>
      <text x="171" y="92" font-size="6" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">chat</text>
      <!-- ターミナル風（Claude Code を示唆） -->
      <path d="M 154 108 L 188 108 L 187 124 L 154 124 Z"/>
      <path d="M 158 114 L 162 117 L 158 120"/>
      <path d="M 166 120 L 174 120"/>
      <!-- API ラベル -->
      <path d="M 156 130 L 188 130 L 187 144 L 156 144 Z"/>
      <text x="172" y="139" font-size="7" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">API</text>
    </g>

    <!-- 下部：安全重視の AI 研究 — 盾と論文 -->
    <g stroke-width="1.8">
      <!-- 盾（safety を示唆、塗らない） -->
      <path d="M 50 154 L 70 152 L 70 168 Q 60 178 50 168 Z"/>
      <!-- 盾の中のチェック -->
      <path d="M 55 162 L 59 166 L 65 158"/>

      <!-- 論文（research を示唆） -->
      <path d="M 116 152 L 138 152 L 138 178 L 116 178 Z"/>
      <path d="M 120 158 L 134 158"/>
      <path d="M 120 164 L 134 164"/>
      <path d="M 120 170 L 130 170"/>

      <!-- 矢印：研究 → 製品（盾／論文 → 中央 → 右の製品列に流れる感じ、軽く曲線） -->
      <path d="M 72 162 Q 88 156 96 144"/>
      <path d="M 116 162 Q 108 154 102 146"/>
      <!-- 矢印の頭（軽く） -->
      <path d="M 96 144 L 94 148 M 96 144 L 100 146"/>
      <path d="M 102 146 L 100 150 M 102 146 L 106 148"/>
    </g>

    <!-- 底のキャプション -->
    <g stroke-width="1.2">
      <text x="96" y="188" font-size="7" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">Anthropic = Claude を作る研究所</text>
    </g>

  </g>
</svg>
