<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3"/>
      <feDisplacementMap in="SourceGraphic" scale="1.8"/>
    </filter>
  </defs>
  <rect width="192" height="192" fill="#F3F6FB"/>
  <g filter="url(#sketch)" stroke="#1A1A1A" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- 吹き出し 1: 左 / 一般ユーザー「直して」 -->
    <g stroke-width="1.6">
      <path d="M 8 20 Q 10 10 22 11 L 56 12 Q 66 14 64 24 L 62 36 Q 60 42 50 40 L 36 40 L 28 48 L 30 40 L 18 40 Q 8 38 8 28 Z"/>
      <text x="36" y="31" font-size="11" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">直して</text>
    </g>

    <!-- 吹き出し 2: 中央 / 業務担当「ルール通り」 -->
    <g stroke-width="1.6">
      <path d="M 70 6 Q 70 2 80 2 L 118 3 Q 128 4 126 14 L 124 24 Q 122 30 112 28 L 104 28 L 98 34 L 100 28 L 82 28 Q 72 26 72 16 Z"/>
