    <!-- 下部ラベル -->
    <g stroke-width="1.4">
      <path d="M 48 172 L 62 170 L 60 184 L 46 184 Z"/>
      <text x="54" y="179" font-size="8" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">app</text>

      <path d="M 90 172 L 104 170 L 102 184 L 88 184 Z"/>
      <text x="96" y="179" font-size="7" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">GPTs</text>

      <path d="M 132 172 L 146 170 L 144 184 L 130 184 Z"/>
      <text x="138" y="179" font-size="8" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">API</text>
    </g>

  </g>
</svg>
