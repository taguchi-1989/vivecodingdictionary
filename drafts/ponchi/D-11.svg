<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="1.9"/>
    </filter>
  </defs>
  <rect width="192" height="192" fill="#F3F6FB"/>
  <g filter="url(#sketch)" stroke="#1A1A1A" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- 吹き出し: 著者の振り返り「前夜の主力」 -->
    <g stroke-width="1.6">
      <path d="M 86 8 Q 88 2 100 2 L 174 4 Q 184 6 182 16 L 180 28 Q 178 34 168 32 L 110 32 L 102 40 L 104 32 L 96 32 Q 86 30 86 20 Z"/>
      <text x="134" y="22" font-size="9" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">前夜の主力</text>
    </g>

    <!-- 著者キャラクター（左下、ノードを指差し） -->
    <g stroke-width="2">
      <!-- 頭 -->
      <path d="M 22 56 C 32 54 36 66 34 76 C 32 84 24 86 20 82 C 16 80 12 58 22 56 Z"/>
      <!-- 目 -->
      <circle cx="22" cy="70" r="1.6" fill="#1A1A1A" stroke="none"/>
      <circle cx="30" cy="70" r="1.6" fill="#1A1A1A" stroke="none"/>
      <!-- 口 -->
      <path d="M 22 77 Q 26 79 30 77"/>
      <!-- 体 -->
      <path d="M 14 88 L 12 124 L 38 122 L 36 86"/>
      <!-- 指差し腕（右へ伸ばす） -->
      <path d="M 36 96 Q 50 100 64 110"/>
      <!-- 指先（短線で指差し示唆） -->
      <path d="M 64 110 L 70 112"/>
      <!-- 反対腕 -->
      <path d="M 14 96 Q 6 108 10 122"/>
      <!-- 足 -->
      <path d="M 18 124 L 20 152"/>
      <path d="M 32 124 L 34 152"/>
    </g>

    <!-- 時間軸（横線、波打たせる） -->
    <g stroke-width="1.8">
      <path d="M 50 132 Q 90 130 130 133 T 188 131"/>
      <!-- 矢印先端 -->
      <path d="M 184 127 L 188 131 L 184 135"/>
    </g>

    <!-- 時間軸の刻み（ノード位置） -->
    <g stroke-width="1.4">
      <path d="M 64 129 L 64 135"/>
      <path d="M 96 128 L 96 134"/>
      <path d="M 128 129 L 128 135"/>
      <path d="M 162 128 L 162 134"/>
    </g>

    <!-- 日付ラベル（軸の下） -->
    <g stroke-width="0">
      <text x="64" y="146" font-size="6" font-family="sans-serif" fill="#1A1A1A" text-anchor="middle">2024-06</text>
      <text x="96" y="146" font-size="6" font-family="sans-serif" fill="#1A1A1A" text-anchor="middle">2024-10</text>
      <text x="128" y="146" font-size="6" font-family="sans-serif" fill="#1A1A1A" text-anchor="middle">2024-10</text>
      <text x="162" y="146" font-size="6" font-family="sans-serif" fill="#1A1A1A" text-anchor="middle">2025-02</text>
    </g>

    <!-- ノード 1: 3.5 Sonnet (★ 転換点) - 上段 Sonnet ティア -->
    <g stroke-width="1.8">
      <!-- ノードの楕円カード -->
      <path d="M 50 76 Q 50 68 58 68 L 78 68 Q 86 68 86 76 L 86 90 Q 86 98 78 98 L 58 98 Q 50 98 50 90 Z"/>
      <!-- ★マーク -->
      <path d="M 64 72 L 66 76 L 70 76 L 67 79 L 68 83 L 64 80 L 60 83 L 61 79 L 58 76 L 62 76 Z" stroke-width="1.4"/>
      <!-- 軸へつなぐドット -->
      <path d="M 64 100 L 64 128"/>
    </g>
    <g stroke-width="0">
      <text x="68" y="89" font-size="6.5" font-family="sans-serif" fill="#1A1A1A" text-anchor="middle">Sonnet</text>
      <text x="68" y="96" font-size="5.5" font-family="sans-serif" fill="#1A1A1A" text-anchor="middle">3.5</text>
    </g>

    <!-- ノード 2: 3.5 Haiku - 下段 Haiku ティア -->
    <g stroke-width="1.6">
      <path d="M 84 108 Q 84 102 92 102 L 108 102 Q 114 102 114 108 L 114 120 Q 114 126 108 126 L 92 126 Q 84 126 84 120 Z"/>
      <!-- 軸へつなぐドット -->
      <path d="M 96 126 L 96 128"/>
    </g>
    <g stroke-width="0">
      <text x="99" y="115" font-size="6.5" font-family="sans-serif" fill="#1A1A1A" text-anchor="middle">Haiku</text>
      <text x="99" y="122" font-size="5.5" font-family="sans-serif" fill="#1A1A1A" text-anchor="middle">3.5</text>
    </g>

    <!-- ノード 3: 3.5 Sonnet v2 - 上段 Sonnet ティア -->
    <g stroke-width="1.6">
      <path d="M 116 76 Q 116 68 124 68 L 142 68 Q 150 68 150 76 L 150 90 Q 150 98 142 98 L 124 98 Q 116 98 116 90 Z"/>
      <path d="M 128 100 L 128 128"/>
    </g>
    <g stroke-width="0">
      <text x="133" y="86" font-size="6.5" font-family="sans-serif" fill="#1A1A1A" text-anchor="middle">Sonnet</text>
      <text x="133" y="94" font-size="5.5" font-family="sans-serif" fill="#1A1A1A" text-anchor="middle">v2</text>
    </g>

    <!-- ノード 4: 3.7 Sonnet (最終形) - 上段 Sonnet ティア -->
    <g stroke-width="1.8">
      <path d="M 150 70 Q 150 62 158 62 L 178 62 Q 186 62 186 70 L 186 86 Q 186 94 178 94 L 158 94 Q 150 94 150 86 Z"/>
      <path d="M 162 96 L 162 128"/>
    </g>
    <g stroke-width="0">
      <text x="167" y="80" font-size="6.5" font-family="sans-serif" fill="#1A1A1A" text-anchor="middle">Sonnet</text>
      <text x="167" y="88" font-size="5.5" font-family="sans-serif" fill="#1A1A1A" text-anchor="middle">3.7</text>
    </g>

    <!-- ノード間の矢印（左→右の流れ） -->
    <g stroke-width="1.3">
      <path d="M 88 84 Q 96 88 102 100"/>
      <path d="M 100 102 L 102 100 L 100 98"/>

      <path d="M 114 110 Q 120 100 118 84"/>
      <path d="M 116 84 L 118 82 L 120 84"/>

      <path d="M 150 80 Q 148 78 152 76"/>
      <path d="M 150 78 L 152 76 L 150 74"/>
    </g>

    <!-- ティアレーン（薄く点線で2段示唆） -->
    <g stroke-width="0.8" stroke-dasharray="2 3">
      <path d="M 48 82 Q 100 80 152 82 T 188 82"/>
      <path d="M 82 114 Q 110 112 140 114"/>
    </g>

    <!-- ティアラベル（左端） -->
    <g stroke-width="0">
      <text x="46" y="62" font-size="6" font-family="sans-serif" fill="#1A1A1A" text-anchor="end">中間</text>
      <text x="82" y="106" font-size="6" font-family="sans-serif" fill="#1A1A1A" text-anchor="end">軽量</text>
    </g>

    <!-- 末端の注記「最終形」 -->
    <g stroke-width="1.2">
      <path d="M 152 158 Q 154 152 162 152 L 184 153 Q 190 154 188 160 L 187 168 Q 186 172 180 171 L 162 171 Q 152 170 152 164 Z"/>
      <text x="170" y="164" font-size="6.5" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">最終形</text>
    </g>
    <!-- 注記から末端ノードへの細い指示線 -->
    <g stroke-width="1">
      <path d="M 168 152 Q 167 130 168 96"/>
    </g>

    <!-- 「コード適性が跳ねた」注記（★ノードの下、矢印で接続） -->
    <g stroke-width="1.2">
      <path d="M 8 158 Q 10 152 18 152 L 70 153 Q 78 154 76 162 L 75 170 Q 74 174 66 173 L 18 172 Q 8 172 8 164 Z"/>
      <text x="42" y="166" font-size="7" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">コード適性が跳ねた</text>
    </g>
    <g stroke-width="1">
      <path d="M 56 152 Q 60 130 64 100"/>
    </g>

  </g>
</svg>
