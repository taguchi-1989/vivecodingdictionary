<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="1.9"/>
    </filter>
  </defs>
  <rect width="192" height="192" fill="#F3F6FB"/>
  <g filter="url(#sketch)" stroke="#1A1A1A" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- 上部: AI の吹き出し「ここ直す」 -->
    <g stroke-width="1.6">
      <path d="M 60 8 Q 60 4 70 4 L 130 5 Q 140 6 138 16 L 136 26 Q 134 32 124 30 L 96 30 L 90 38 L 92 30 L 72 30 Q 62 28 62 18 Z"/>
      <text x="100" y="22" font-size="10" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">ここ直す</text>
    </g>

    <!-- 1. issue（バグ票）左 -->
    <g stroke-width="2">
      <!-- 書類風 -->
      <path d="M 8 50 L 8 96 Q 8 100 12 100 L 38 100 Q 42 100 42 96 L 42 56 L 36 50 Z"/>
      <path d="M 36 50 L 36 56 L 42 56"/>
      <!-- issue タイトル線 -->
      <path d="M 13 62 Q 22 60 32 62"/>
      <path d="M 13 70 Q 22 68 36 70"/>
      <path d="M 13 78 Q 20 76 28 78"/>
      <!-- バグ印（小さな虫） -->
      <path d="M 28 88 Q 32 85 35 88 Q 35 93 31 94 Q 27 93 28 88 Z"/>
      <path d="M 26 87 L 23 86"/>
      <path d="M 37 87 L 40 86"/>
      <!-- ラベル issue -->
      <text x="25" y="110" font-size="7" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">issue</text>
    </g>

    <!-- 矢印 1: issue → AI -->
    <g stroke-width="1.6">
      <path d="M 44 78 Q 52 76 60 78"/>
      <path d="M 60 78 L 56 75"/>
      <path d="M 60 78 L 56 81"/>
    </g>

    <!-- 2. AI エージェント（中央、ロボット頭） -->
    <g stroke-width="2">
      <!-- ロボット頭 -->
      <path d="M 70 56 Q 70 50 76 50 L 102 51 Q 108 52 108 58 L 107 84 Q 106 90 100 90 L 76 89 Q 70 88 70 82 Z"/>
      <!-- アンテナ -->
      <path d="M 88 50 L 88 42"/>
      <circle cx="88" cy="40" r="1.6" fill="#1A1A1A" stroke="none"/>
      <!-- 目（四角めの黒丸） -->
      <circle cx="80" cy="66" r="2" fill="#1A1A1A" stroke="none"/>
      <circle cx="98" cy="66" r="2" fill="#1A1A1A" stroke="none"/>
      <!-- 口（横線） -->
      <path d="M 80 78 L 98 78"/>
      <path d="M 84 78 L 84 81"/>
      <path d="M 90 78 L 90 81"/>
      <path d="M 94 78 L 94 81"/>
      <!-- 体（簡略） -->
      <path d="M 76 92 L 74 116 L 104 116 L 102 91"/>
      <!-- 腕、片方がパッチ書類を出す -->
      <path d="M 76 98 Q 68 106 72 116"/>
      <path d="M 102 98 Q 112 102 116 110"/>
      <!-- ラベル -->
      <text x="89" y="128" font-size="7" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">AI</text>
    </g>

    <!-- 矢印 2: AI → パッチ -->
    <g stroke-width="1.6">
      <path d="M 116 110 Q 122 110 128 108"/>
      <path d="M 128 108 L 124 106"/>
      <path d="M 128 108 L 125 111"/>
    </g>

    <!-- 3. パッチ（差分書類） 右上 -->
    <g stroke-width="1.8">
      <path d="M 130 50 L 130 92 Q 130 96 134 96 L 158 96 Q 162 96 162 92 L 162 56 L 156 50 Z"/>
      <path d="M 156 50 L 156 56 L 162 56"/>
      <!-- 差分: + と - -->
      <path d="M 136 64 L 142 64"/>
      <path d="M 139 61 L 139 67"/>
      <path d="M 136 74 L 142 74"/>
      <path d="M 136 82 L 142 82"/>
      <path d="M 139 79 L 139 85"/>
      <path d="M 146 64 Q 152 62 158 64"/>
      <path d="M 146 74 Q 152 72 158 74"/>
      <path d="M 146 82 Q 152 80 158 82"/>
      <!-- ラベル patch -->
      <text x="146" y="108" font-size="7" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">patch</text>
    </g>

    <!-- 矢印 3: パッチ → テスト（下向き） -->
    <g stroke-width="1.6">
      <path d="M 146 112 Q 144 120 142 128"/>
      <path d="M 142 128 L 145 124"/>
      <path d="M 142 128 L 139 125"/>
    </g>

    <!-- 4. テスト（✓ と ✗） 右下 -->
    <g stroke-width="2">
      <!-- 枠 -->
      <path d="M 124 130 L 124 158 Q 124 162 128 162 L 162 162 Q 166 162 166 158 L 166 130 Q 166 126 162 126 L 128 126 Q 124 126 124 130 Z"/>
      <!-- ✓ -->
      <path d="M 130 142 L 134 148 L 142 134"/>
      <!-- ✗ -->
      <path d="M 150 134 L 160 148"/>
      <path d="M 160 134 L 150 148"/>
      <!-- ラベル test -->
      <text x="145" y="174" font-size="7" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">test</text>
    </g>

    <!-- 5. スコア軸（左下、80% 頭打ち帯） -->
    <g stroke-width="1.8">
      <!-- 縦軸 -->
      <path d="M 18 130 Q 17 150 18 174"/>
      <!-- 横軸 -->
      <path d="M 18 174 Q 50 173 96 174"/>
      <!-- 目盛 -->
      <path d="M 14 134 L 18 134"/>
      <path d="M 14 152 L 18 152"/>
      <path d="M 14 170 L 18 170"/>
      <text x="11" y="137" font-size="6" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="end">100</text>
      <text x="11" y="155" font-size="6" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="end">80</text>
      <text x="11" y="173" font-size="6" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="end">0</text>
      <!-- 80% 頭打ち帯（点線風の斜線） -->
      <path d="M 20 142 Q 50 140 96 142" stroke-dasharray="2 2"/>
      <!-- スコアの折れ線（複数モデルが 80 帯に集まる） -->
      <path d="M 28 162 Q 40 152 52 146" stroke-width="1.5"/>
      <path d="M 52 146 Q 64 144 76 143" stroke-width="1.5"/>
      <path d="M 76 143 Q 86 142 96 142" stroke-width="1.5"/>
      <!-- 点 -->
      <circle cx="28" cy="162" r="1.6" fill="#1A1A1A" stroke="none"/>
      <circle cx="52" cy="146" r="1.6" fill="#1A1A1A" stroke="none"/>
      <circle cx="76" cy="143" r="1.6" fill="#1A1A1A" stroke="none"/>
      <circle cx="96" cy="142" r="1.6" fill="#1A1A1A" stroke="none"/>
      <!-- 頭打ち注記 -->
      <text x="58" y="138" font-size="6" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">80%の壁</text>
    </g>

  </g>
</svg>
