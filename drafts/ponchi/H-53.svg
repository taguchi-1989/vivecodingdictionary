<svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="11"/>
      <feDisplacementMap in="SourceGraphic" scale="1.9"/>
    </filter>
  </defs>
  <rect width="192" height="192" fill="#F3F6FB"/>
  <g filter="url(#sketch)" stroke="#1A1A1A" stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- 上部ラベル: Before / After -->
    <g stroke-width="1.3">
      <text x="22" y="14" font-size="8" font-family="sans-serif" fill="#1A1A1A" stroke="none">Before</text>
      <text x="148" y="14" font-size="8" font-family="sans-serif" fill="#1A1A1A" stroke="none">After</text>
    </g>

    <!-- 時系列の主軸（波打つ横線） -->
    <g stroke-width="1.8">
      <path d="M 6 100 Q 30 98 56 101 Q 80 103 96 100 Q 112 97 136 100 Q 162 103 186 100"/>
      <!-- 矢印の先端 -->
      <path d="M 180 95 L 186 100 L 180 105"/>
    </g>

    <!-- 中央の星（2022-11-30 = 公開の瞬間） -->
    <g stroke-width="2.2">
      <path d="M 96 56 L 100 70 L 114 70 L 103 79 L 107 92 L 96 84 L 85 92 L 89 79 L 78 70 L 92 70 Z"/>
      <!-- 星の周りの放射線（インパクト線） -->
      <path d="M 96 44 L 96 50"/>
      <path d="M 76 52 L 80 58"/>
      <path d="M 116 52 L 112 58"/>
      <path d="M 70 64 L 76 66"/>
      <path d="M 122 64 L 116 66"/>
    </g>

    <!-- 中央の日付ラベル（吹き出し風） -->
    <g stroke-width="1.4">
      <path d="M 70 22 Q 70 16 78 16 L 116 17 Q 124 18 122 26 L 121 34 Q 119 40 110 38 L 100 38 L 96 44 L 97 38 L 80 38 Q 70 36 70 28 Z"/>
      <text x="96" y="29" font-size="9" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">2022.11.30</text>
    </g>

    <!-- 中央から星につなぐ短い線 -->
    <g stroke-width="1.2">
      <path d="M 96 44 Q 96 48 96 52"/>
    </g>

    <!-- 左：研究者（白衣 + ノート PC、軸の上に立つ） -->
    <g stroke-width="1.9">
      <!-- 頭 -->
      <path d="M 24 110 C 32 108 36 118 34 126 C 32 132 26 134 22 130 C 18 128 16 112 24 110 Z"/>
      <!-- 目 -->
      <circle cx="24" cy="121" r="1.3" fill="#1A1A1A" stroke="none"/>
      <circle cx="30" cy="121" r="1.3" fill="#1A1A1A" stroke="none"/>
      <!-- 口 -->
      <path d="M 25 127 Q 28 128 31 127"/>
      <!-- 体（白衣の襟） -->
      <path d="M 16 134 L 14 162 L 38 162 L 36 132"/>
      <path d="M 26 134 L 25 144"/>
      <!-- 腕 + ノートPC -->
      <path d="M 18 140 Q 14 148 18 158"/>
      <path d="M 36 140 Q 40 146 36 154"/>
      <!-- ノート PC（台形） -->
      <path d="M 18 154 L 40 154 L 42 164 L 16 164 Z"/>
      <path d="M 20 156 L 38 156"/>
    </g>

    <!-- 左の小吹き出し: API で試す -->
    <g stroke-width="1.2">
      <path d="M 4 80 Q 4 74 12 74 L 50 74 Q 56 76 54 82 L 53 88 Q 51 92 44 90 L 36 90 L 30 96 L 32 90 L 14 90 Q 4 88 4 84 Z"/>
      <text x="29" y="84" font-size="7" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">API で試す</text>
    </g>

    <!-- 右：一般ユーザー 2 人（チャット画面を見て驚く） -->
    <!-- 人物 A（右寄り上） -->
    <g stroke-width="1.9">
      <!-- 頭 -->
      <path d="M 138 112 C 146 110 150 120 148 128 C 146 134 140 136 136 132 C 132 130 130 114 138 112 Z"/>
      <circle cx="138" cy="123" r="1.3" fill="#1A1A1A" stroke="none"/>
      <circle cx="144" cy="123" r="1.3" fill="#1A1A1A" stroke="none"/>
      <!-- 驚いた口 -->
      <path d="M 140 129 Q 142 131 144 129 Q 142 132 140 129 Z"/>
      <!-- 体 -->
      <path d="M 130 136 L 128 162 L 152 162 L 150 134"/>
      <!-- 腕 + スマホ -->
      <path d="M 132 142 Q 128 150 134 158"/>
      <path d="M 150 142 Q 154 150 148 158"/>
      <rect x="146" y="150" width="9" height="14" rx="1.2" stroke-width="1.4"/>
      <path d="M 148 154 L 153 154"/>
    </g>

    <!-- 人物 B（さらに右、もう一人） -->
    <g stroke-width="1.9">
      <!-- 頭 -->
      <path d="M 168 116 C 176 114 180 124 178 132 C 176 138 170 140 166 136 C 162 134 160 118 168 116 Z"/>
      <circle cx="168" cy="127" r="1.3" fill="#1A1A1A" stroke="none"/>
      <circle cx="174" cy="127" r="1.3" fill="#1A1A1A" stroke="none"/>
      <path d="M 170 133 Q 172 135 174 133"/>
      <!-- 体 -->
      <path d="M 160 140 L 158 164 L 182 164 L 180 138"/>
      <path d="M 162 144 Q 158 152 164 160"/>
      <path d="M 180 144 Q 184 150 178 158"/>
    </g>

    <!-- 右の吹き出し: AI と話せる！ -->
    <g stroke-width="1.2">
      <path d="M 124 80 Q 124 74 132 74 L 184 74 Q 190 76 188 82 L 187 90 Q 185 94 178 92 L 162 92 L 158 98 L 160 92 L 134 92 Q 124 90 124 84 Z"/>
      <text x="156" y="85" font-size="8" font-family="sans-serif" fill="#1A1A1A" stroke="none" text-anchor="middle">AI と話せる</text>
    </g>

    <!-- 後続イベントのドット（時間軸の右側に小さく） -->
    <g stroke-width="1.4">
      <circle cx="120" cy="100" r="2" fill="#1A1A1A" stroke="none"/>
      <circle cx="134" cy="100" r="2" fill="#1A1A1A" stroke="none"/>
      <circle cx="148" cy="100" r="2" fill="#1A1A1A" stroke="none"/>
      <circle cx="162" cy="100" r="2" fill="#1A1A1A" stroke="none"/>
    </g>

    <!-- 下部ラベル（後続イベント、極小） -->
    <g stroke-width="1.1">
      <text x="118" y="180" font-size="6" font-family="sans-serif" fill="#1A1A1A" stroke="none">Bard</text>
      <text x="132" y="186" font-size="6" font-family="sans-serif" fill="#1A1A1A" stroke="none">Claude</text>
      <text x="148" y="180" font-size="6" font-family="sans-serif" fill="#1A1A1A" stroke="none">Copilot</text>
      <text x="164" y="186" font-size="6" font-family="sans-serif" fill="#1A1A1A" stroke="none">Cursor</text>
      <!-- 下部ドットからラベルへの細い線 -->
      <path d="M 120 102 Q 121 174 122 178"/>
      <path d="M 134 102 Q 135 180 136 184"/>
      <path d="M 148 102 Q 149 174 150 178"/>
      <path d="M 162 102 Q 163 180 164 184"/>
    </g>

  </g>
</svg>
