<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#123E82">
<meta name="description" content="非エンジニア・周辺職種の人が、AI 開発まわりの語彙を「辞書引き」できるようにする図鑑。327 件の用語を見開き 2 ページで読めます。">
<title>バイブコーディング図鑑</title>
<style>
  :root {
    --ink: #1A1A1A;
    --ink-2: #4A5568;
    --ink-3: #8A94A6;
    --ink-blue: #2F7BE6;
    --ink-blue-700: #1E5FBC;
    --ink-blue-900: #123E82;
    --ink-blue-50: #EAF1FB;
    --paper: #FFFFFF;
    --paper-2: #F3F6FB;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--paper-2);
    color: var(--ink);
    font-family: "Hiragino Sans", "Yu Gothic UI", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    text-align: center;
  }

  /* 本の表紙 */
  .book-cover-wrap {
    perspective: 1400px;
    margin-bottom: 36px;
  }
  .book-cover {
    width: 220px;
    height: 308px;
    position: relative;
    transform: rotateY(-20deg) rotateX(4deg);
    transition: transform 0.4s cubic-bezier(0.2,0.8,0.3,1);
    cursor: pointer;
  }
  .book-cover:hover { transform: rotateY(-10deg) rotateX(2deg); }
  .cover-front {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #FFFFFF 0%, #F0F4FC 100%);
    border-radius: 2px 6px 6px 2px;
    box-shadow:
      0 28px 56px -18px rgba(0,0,0,0.35),
      0 16px 32px -16px rgba(0,0,0,0.2);
    padding: 26px 22px 20px 22px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .cover-front::before {
    content: ""; position: absolute;
    top: 0; bottom: 0; left: 0; width: 10px;
    background: linear-gradient(90deg, rgba(18,62,130,0.25), transparent);
  }
  .cover-spine {
    position: absolute; top: 0; left: 0;
    width: 16px; height: 100%;
    background: linear-gradient(90deg, #08163A, var(--ink-blue-900));
    transform: rotateY(-90deg) translateX(-8px);
    transform-origin: left center;
  }
  .cover-eyebrow {
    font-family: "Inter", system-ui, sans-serif;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--ink-blue);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .cover-title {
    font-size: 24px;
    font-weight: 900;
    line-height: 1.15;
    color: #0A1E48;
    letter-spacing: -0.02em;
    margin: 0;
  }
  .cover-divider {
    width: 28px;
    height: 3px;
    background: var(--ink-blue);
    margin: 12px 0;
  }
  .cover-copy {
    font-size: 11px;
    line-height: 1.7;
    color: var(--ink-2);
    font-weight: 700;
  }
  .cover-art {
    flex: 1;
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cover-art svg {
    width: 100%;
    max-height: 100px;
  }
  .cover-footer {
    margin-top: 8px;
    display: flex;
    justify-content: space-between;
    font-size: 8px;
    color: var(--ink-3);
    font-family: "Inter", system-ui, sans-serif;
    letter-spacing: 0.1em;
  }
  .cover-footer .author { color: var(--ink-2); font-weight: 700; }

  /* タイトルとサブ */
  h1.page-title {
    font-size: 28px;
    font-weight: 900;
    margin: 0 0 8px 0;
    color: var(--ink);
  }
  .tagline {
    font-size: 14px;
    color: var(--ink-2);
    margin: 0 0 32px 0;
    max-width: 480px;
    line-height: 1.8;
  }
  .tagline strong { color: var(--ink-blue-900); }

  /* メイン CTA：本を読む */
  .cta-primary {
    display: inline-block;
    background: var(--ink-blue);
    color: white;
    padding: 18px 40px;
    border-radius: 10px;
    text-decoration: none;
    font-size: 18px;
    font-weight: 700;
    box-shadow: 0 6px 20px rgba(18,62,130,0.25);
    transition: transform 0.12s, box-shadow 0.15s;
  }
  .cta-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 28px rgba(18,62,130,0.3);
  }
  .cta-primary:active { transform: translateY(0); }
  .cta-primary .arrow { margin-left: 10px; opacity: 0.85; }

  /* サブリンク */
  .sub-links {
    margin-top: 28px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 13px;
  }
  .sub-links a {
    color: var(--ink-blue-700);
    text-decoration: none;
    padding: 6px 14px;
    border: 1px solid #D6DEE8;
    border-radius: 999px;
    background: white;
    transition: border-color 0.15s;
  }
  .sub-links a:hover { border-color: var(--ink-blue); }

  /* 統計 */
  .stats {
    display: flex;
    gap: 28px;
    margin-top: 24px;
    font-size: 12px;
    color: var(--ink-3);
    font-family: "Inter", system-ui, sans-serif;
    letter-spacing: 0.06em;
  }
  .stats strong {
    color: var(--ink-blue-900);
    font-size: 16px;
    margin-right: 4px;
  }

  footer {
    padding: 20px;
    text-align: center;
    font-size: 11px;
    color: var(--ink-3);
    border-top: 1px solid #E5EAF0;
    background: white;
  }
  footer a { color: var(--ink-blue-700); text-decoration: none; }

  @media (max-width: 480px) {
    .book-cover { width: 180px; height: 252px; }
    h1.page-title { font-size: 22px; }
    .tagline { font-size: 13px; }
    .cta-primary { padding: 16px 28px; font-size: 16px; }
    .stats { gap: 16px; font-size: 11px; }
    .stats strong { font-size: 14px; }
  }
</style>
</head>
